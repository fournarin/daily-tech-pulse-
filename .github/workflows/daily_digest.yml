name: 🤖 Daily Tech Pulse

on:
  schedule:
    # GitHub cron is UTC-only. Avoid minute 0 — runs are often delayed/dropped at the top of the hour.
    # Primary + fallbacks (Bangkok ICT = UTC+7). main.py skips if today's report is already on main.
    - cron: "17 1 * * *"   # 08:17 Bangkok
    - cron: "17 2 * * *"   # 09:17 Bangkok (fallback)
    - cron: "17 3 * * *"   # 10:17 Bangkok (fallback)
  workflow_dispatch:

# Queue overlapping schedule triggers; main.py is idempotent but this avoids wasted runs.
concurrency:
  group: daily-tech-pulse-digest
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Tech Pulse bot
        env:
          DAILY_TOKEN: ${{ secrets.DAILY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/main.py
